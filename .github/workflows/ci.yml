name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
        - uses: actions/checkout@v3
          with:
              fetch-depth: 0
              submodules: recursive
                
        - name: Setup .NET
          uses: actions/setup-dotnet@v3
          with:
              dotnet-version: 8.0.x
                
        - name: Restore dependencies
          run: dotnet restore
            
        - name: Build
          run: dotnet build --no-restore -c Release
            
        - name: Test
          run: .artifacts/bin/source/ShyFox.MonoPack/Release/net8.0/ShyFox.MonoPack -p examples/ShyFox.MonoPack.Tool.Example/ShyFox.MonoPack.Tool.Example.csproj -o ./artifacts/builds -e ExampleProject -r win-arm64 -r win-x64 -r linux-x64 -r osx-arm64 -r osx-x64 -i examples/ShyFox.MonoPack.Tool.Example/Info.plist -c examples/ShyFox.MonoPack.Tool.Example/Icon.icns -v
            
        # - name: Package
        #   if: github.event_name != 'pull_request' && matrix.os == 'ubuntu-latest'
        #   run: dotnet pack --no-build --output ./artifacts
            
        # - name: Upload artifacts
        #   if: github.event_name != 'pull_request' && matrix.os == 'ubuntu-latest'
        #   uses: actions/upload-artifact@v3
        #   with:
        #       name: nuget-packages
        #       path: ./artifacts/*.nupkg